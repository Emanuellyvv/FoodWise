<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastre-se — FoodWise</title>
    <link rel="stylesheet" href="css/style.css"/>
    <link rel="stylesheet" href="css/pages.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        .form-page { display: flex; justify-content: center; padding: 4rem 1rem; }
        .form-wrapper { background: var(--white); padding: 2.5rem; border-radius: var(--radius-lg); box-shadow: var(--shadow-md); width: 100%; max-width: 600px; }
        .form-group { margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .form-input { padding: 0.75rem; border: 1px solid var(--neutral-300); border-radius: var(--radius-md); font-size: 1rem; }
        .progress-steps { display: flex; justify-content: space-between; margin-bottom: 2rem; position: relative; }
        .step-dot { background: var(--neutral-300); color: var(--neutral-700); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .step-dot.active { background: var(--green-mid); color: var(--white); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo"><img src="image/IMG_9064.jpg" alt="Logo"></a>
            <a href="login.html" class="btn btn-ghost">Entrar</a>
        </div>
    </nav>

    <main class="form-page container">
        <div class="form-wrapper">
            <div class="form-header" style="text-align: center; margin-bottom: 2rem;">
                <h1>Crie sua Conta no FoodWise</h1>
                <p>Defina as suas metas e o seu estilo de vida alimentar.</p>
            </div>

            <div class="progress-steps">
                <div class="step-dot active" id="step-dot-1">1</div>
                <div class="step-dot" id="step-dot-2">2</div>
            </div>

            <form id="foodwiseForm" onsubmit="salvarCadastro(event)">
                <div id="etapa1">
                    <div class="form-group">
                        <label for="nome" class="form-label">Nome Completo:</label>
                        <input type="text" id="nome" class="form-input" required placeholder="Seu nome">
                    </div>
                    <div class="form-group">
                        <label for="idade" class="form-label">Idade:</label>
                        <input type="number" id="idade" class="form-input" min="1" required placeholder="Ex: 25">
                    </div>
                    <div class="form-group">
                        <label for="orcamento" class="form-label">Orçamento mensal máximo p/ Delivery (R$):</label>
                        <input type="number" id="orcamento" class="form-input" required placeholder="Ex: 300">
                    </div>
                    <button type="button" class="btn btn-primary" style="width: 100%;" onclick="proximaEtapa()">Avançar para Perfil Alimentar</button>
                </div>

                <div id="etapa2" style="display: none;">
                    <div class="form-group">
                        <label for="estiloVida" class="form-label">Seu estilo de vida atual:</label>
                        <select id="estiloVida" class="form-input" required>
                            <option value="">Selecione...</option>
                            <option value="fit">Focado / Fitness (Segunda a Sexta saudável)</option>
                            <option value="vegano">Vegano / Vegetariano</option>
                            <option value="tradicional">Moderado / Come de tudo</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="email" class="form-label">E-mail de acesso:</label>
                        <input type="email" id="email" class="form-input" required placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label for="senha" class="form-label">Senha:</label>
                        <input type="password" id="senha" class="form-input" required placeholder="Mínimo 6 caracteres">
                    </div>
                    <div style="display: flex; gap: 1rem;">
                        <button type="button" class="btn btn-outline" style="flex: 1;" onclick="etapaAnterior()">Voltar</button>
                        <button type="submit" class="btn btn-primary" style="flex: 2;">Concluir Cadastro 🎉</button>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
