<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastre-se — FoodWise</title>
    <link rel="stylesheet" href="css/style.css"/>
    <link rel="stylesheet" href="css/pages.css"/>
    <link href="https://fonts.googleapis.com/css?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        .form-page { display: flex; justify-content: center; padding: 4rem 1rem; }
        .form-wrapper { background: var(--white); padding: 2.5rem; border-radius: var(--radius-lg); box-shadow: var(--shadow-md); width: 100%; max-width: 600px; }
        .form-group { margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .form-input { padding: 0.75rem; border: 1px solid var(--neutral-300); border-radius: var(--radius-md); }
        .progress-steps { display: flex; justify-content: space-between; margin-bottom: 2rem; }
        .progress-step { color: var(--neutral-500); font-weight: 600; }
        .progress-step.active { color: var(--green-mid); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo"><img src="image/IMG_9064.jpg" alt="Logo"></a>
            <a href="login.html" class="btn btn-ghost">Entrar</a>
        </div>
    </nav>

    <main class="form-page container">
        <div class="form-wrapper">
            <div class="form-header" style="text-align: center; margin-bottom: 2rem;">
                <h1>Crie sua Conta no FoodWise</h1>
                <p>Defina suas metas financeiras, hábitos alimentares e passe a pedir de forma consciente.</p>
            </div>

            <div class="progress-steps">
                <div class="progress-step active" id="step-dot-1">1. Dados Pessoais</div>
                <div class="progress-step" id="step-dot-2">2. Estilo Alimentar</div>
            </div>

            <form id="foodwiseForm" onsubmit="salvarCadastro(event)">
                
                <fieldset id="etapa1" style="border: none;">
                    <div class="form-group">
                        <label for="idade" class="form-label">Idade:</label>
                        <input type="number" id="idade" class="form-input" placeholder="Ex: 25" min="1" required />
                    </div>
                    <div class="form-group">
                        <label for="dataNascimento" class="form-label">Data de Nascimento:</label>
                        <input type="date" id="dataNascimento" class="form-input" required />
                    </div>
                    <div class="form-group">
                        <label for="cpf" class="form-label">CPF:</label>
                        <input type="text" id="cpf" class="form-input" placeholder="000.000.000-00" required />
                    </div>
                    <div class="form-group">
                        <label for="telefone" class="form-label">Telefone / WhatsApp:</label>
                        <input type="tel" id="telefone" class="form-input" placeholder="(41) 99999-9999" required />
                    </div>
                    <button type="button" class="btn btn-primary" style="width: 100%;" onclick="proximaEtapa()">Avançar para Hábitos Alimentares</button>
                </fieldset>

                <fieldset id="etapa2" style="display: none; border: none;">
                    <div class="form-group">
                        <label for="estiloVida" class="form-label">Seu estilo de vida alimentar:</label>
                        <select id="estiloVida" class="form-input" required>
                            <option value="">Selecione...</option>
                            <option value="fit">Gosto de comida saudável / Fit</option>
                            <option value="vegano">Vegano / Vegetariano</option>
                            <option value="tradicional">Tradicional (Como de tudo)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="email" class="form-label">E-mail:</label>
                        <input type="email" id="email" class="form-input" placeholder="seu@email.com" required />
                    </div>
                    <div class="form-group">
                        <label for="senha" class="form-label">Senha:</label>
                        <input type="password" id="senha" class="form-input" placeholder="Sua senha" required />
                    </div>
                    <div style="display: flex; gap: 1rem;">
                        <button type="button" class="btn btn-outline" style="flex: 1;" onclick="etapaAnterior()">Voltar</button>
                        <button type="submit" class="btn btn-primary" style="flex: 2;">Concluir Cadastro</button>
                    </div>
                </fieldset>
            </form>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
