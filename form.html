<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodWise - Cadastro</title>
    <link rel="stylesheet" href="css/style.css"> <!-- Verifique se o caminho está correto -->
</head>
<body class="body-cadastro">
    <div class="container">
        <header class="header-form">
            <h1>Faça seu cadastro</h1>
            <div class="ajuda-link">
                <img src="icone-acessibilidade.png" alt="Acessibilidade" class="icone">
                <span>precisa de ajuda? <a href="#">clique aqui</a></span>
            </div>
        </header>

        <form id="meuFormulario">
            <div class="grupo-input">
                <label for="nome">Seu nome</label>
                <input type="text" id="nome" required>
            </div>

            <div class="grupo-input">
                <label for="nascimento">Data de nascimento</label>
                <input type="text" id="nascimento" placeholder="dd/mm/aaaa">
            </div>

            <div class="grupo-input">
                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone">
            </div>

            <div class="grupo-input">
                <label for="endereco">Endereço</label>
                <input type="text" id="endereco">
            </div>

            <div class="grupo-input">
                <label for="email">Insira seu e-mail</label>
                <input type="email" id="email" required>
            </div>

            <button type="submit" class="btn-proximo">Próximo</button>
        </form>

        <footer class="footer-form">
            <p>Seu nome de perfil no Canva não será compartilhado. Nunca envie senhas.</p>
        </footer>
    </div>

    <script src="js/script.js"></script> <!-- Verifique se o caminho está correto -->
</body>
</html>
