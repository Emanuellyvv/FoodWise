<!-- Dentro do seu form.html -->
<form id="foodwiseForm">
    
    <!-- ETAPA 1: Dados Pessoais, Contato e Renda -->
    <fieldset id="etapa1">
        <legend>Dados Pessoais e Orçamento</legend>
        
        <label for="nome">Nome Completo:</label>
        <input type="text" id="nome" placeholder="Seu nome" required>
        
        <label for="idade">Idade:</label>
        <input type="number" id="idade" placeholder="Ex: 25" required>
        
        <label for="dataNascimento">Data de Nascimento:</label>
        <input type="date" id="dataNascimento" required>
        
        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" placeholder="000.000.000-00" required>
        
        <label for="endereco">Endereço:</label>
        <input type="text" id="endereco" placeholder="Rua, Número, Bairro" required>
        
        <label for="telefone">Telefone / WhatsApp:</label>
        <input type="tel" id="telefone" placeholder="(11) 99999-9999" required>
        
        <label for="renda">Sua Renda Mensal (R$):</label>
        <input type="number" step="0.01" id="renda" placeholder="Ex: 2500.00" required>
        
        <label for="orcamentoAlimentacao">Orçamento para Alimentação (R$):</label>
        <input type="number" step="0.01" id="orcamentoAlimentacao" placeholder="Ex: 600.00" required>
        
        <!-- Botão para avançar para a próxima parte -->
        <button type="button" onclick="proximaEtapa()">Avançar</button>
    </fieldset>

    <!-- ETAPA 2: Estilo de Vida e Notificações (Escondida no início) -->
    <fieldset id="etapa2" style="display: none;">
        <legend>Seu Estilo de Vida</legend>
        
        <label for="estiloVida">Seu estilo de vida alimentar:</label>
        <select id="estiloVida" required>
            <option value="">Selecione...</option>
            <option value="fit">Gosto de comida saudável / Fit</option>
            <option value="vegano">Vegano / Vegetariano</option>
            <option value="tradicional">Tradicional (Como de tudo)</option>
        </select>
        
        <!-- Botões para interagir -->
        <button type="button" onclick="etapaAnterior()">Voltar</button>
        <button type="submit">Finalizar Cadastro no FoodWise</button>
    </fieldset>

</form>

<!-- Injeção obrigatória do Supabase antes de fechar a tag </body> -->
<script src="https://jsdelivr.net"></script>
<script src="JS/form.js"></script>
